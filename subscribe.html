<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Subscribe – Ghost of Radio</title>
  <meta name="description" content="Subscribe to Ghost of Radio and get notified when new classic old-time radio shows and episodes are added.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Special+Elite&family=Lato:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .subscribe-hero{min-height:80vh;display:flex;align-items:center;justify-content:center;background:#0a0a0a;padding:2rem;}
    .subscribe-card{background:#111;border:1px solid #222;border-radius:12px;padding:3rem 2.5rem;max-width:520px;width:100%;text-align:center;box-shadow:0 8px 40px rgba(0,0,0,.6);}
    .subscribe-logo{font-family:'Special Elite',cursive;color:#c9a84c;font-size:2rem;margin-bottom:.25rem;}
    .subscribe-sub{color:#555;font-size:.85rem;letter-spacing:.1em;text-transform:uppercase;margin-bottom:2rem;}
    .subscribe-title{font-family:'Special Elite',cursive;color:#f0dca0;font-size:1.8rem;margin-bottom:.75rem;}
    .subscribe-desc{color:#888;font-size:1rem;margin-bottom:2rem;line-height:1.6;}
    .subscribe-form{display:flex;flex-direction:column;gap:.75rem;}
    .subscribe-input{background:#1a1a1a;border:1px solid #333;color:#f0dca0;padding:.85rem 1.1rem;border-radius:8px;font-size:1rem;width:100%;box-sizing:border-box;}
    .subscribe-input:focus{outline:none;border-color:#c9a84c;}
    .subscribe-btn{background:#c9a84c;color:#0a0a0a;border:none;padding:.85rem 1.5rem;border-radius:8px;font-size:1rem;font-weight:700;cursor:pointer;font-family:'Lato',sans-serif;}
    .subscribe-btn:hover{background:#e0c060;}
    .subscribe-fine{color:#444;font-size:.75rem;margin-top:1rem;}
    .subscribe-back{display:inline-block;margin-top:2rem;color:#555;font-size:.85rem;text-decoration:none;}
    .subscribe-back:hover{color:#c9a84c;}
    .email-capture{background:#0d0d0d;border-top:1px solid #1a1a1a;border-bottom:1px solid #1a1a1a;}
    .email-capture__inner{text-align:center;max-width:500px;margin:0 auto;padding:2rem 0;}
    .email-capture__title{font-family:'Special Elite',cursive;color:#c9a84c;font-size:1.6rem;margin-bottom:.5rem;}
    .email-capture__desc{color:#888;margin-bottom:1.5rem;font-size:1rem;}
    .email-capture__form{display:flex;gap:.5rem;max-width:420px;margin:0 auto 1rem;}
    .email-capture__input{flex:1;background:#1a1a1a;border:1px solid #333;color:#f0dca0;padding:.7rem 1rem;border-radius:6px;font-size:1rem;}
    .email-capture__input:focus{outline:none;border-color:#c9a84c;}
    .email-capture__btn{background:#c9a84c;color:#0a0a0a;border:none;padding:.7rem 1.2rem;border-radius:6px;font-weight:700;cursor:pointer;white-space:nowrap;}
    .email-capture__btn:hover{background:#e0c060;}
    .email-capture__fine{color:#555;font-size:.75rem;}
  </style>
</head>
<body>
  <main class="subscribe-hero">
    <div class="subscribe-card">
      <div class="subscribe-logo">👻 Ghost of Radio</div>
      <div class="subscribe-sub">Free Subscription</div>
      <h1 class="subscribe-title">📻 Never Miss an Episode</h1>
      <p class="subscribe-desc">Get notified when new classic old-time radio shows and episodes are added. No spam — just the good stuff from the golden age of radio.</p>
      <form class="subscribe-form" id="emailForm" onsubmit="submitEmail(event)">
        <input type="email" name="email" placeholder="your@email.com" required class="subscribe-input" aria-label="Email address" id="emailInput">
        <button type="submit" class="subscribe-btn" id="emailBtn">Subscribe Free</button>
      </form>
      <p id="emailMsg" style="display:none;color:#c9a84c;margin-top:.5rem"></p>
      <script>
      async function submitEmail(e) {
        e.preventDefault();
        var email = document.getElementById("emailInput").value;
        var btn = document.getElementById("emailBtn");
        var msg = document.getElementById("emailMsg");
        btn.textContent = "Subscribing...";
        btn.disabled = true;
        try {
          var r = await fetch("https://gor-email-capture.ghostofradio.workers.dev", {
            method:"POST", headers:{"Content-Type":"application/json"},
            body: JSON.stringify({email:email})
          });
          var d = await r.json();
          msg.textContent = d.success ? "\u2705 Subscribed! Check your email." : "Something went wrong. Try again.";
        } catch(err) { msg.textContent = "Something went wrong. Try again."; }
        msg.style.display = "block";
        btn.style.display = "none";
      }
      </script>
      <p class="subscribe-fine">No spam. Unsubscribe anytime. ghostofradio.com</p>
      <a href="/" class="subscribe-back">← Back to Ghost of Radio</a>
    </div>
  </main>
</body>
</html>
